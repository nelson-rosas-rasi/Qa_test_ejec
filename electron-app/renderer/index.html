<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QA Test Runner</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== TITLEBAR ===== -->
  <div class="titlebar">
    <div class="titlebar-brand">
      <div class="titlebar-logo">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="#fff"><path d="m7 4 12 8-12 8V4z"/></svg>
      </div>
      <span class="titlebar-name">QA Test Runner</span>
      <span class="titlebar-version">v1.4.0</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btn-min" title="Minimizar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
      </button>
      <button class="tb-btn" id="btn-max" title="Maximizar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="1.5"/></svg>
      </button>
      <button class="tb-btn tb-close" id="btn-close" title="Cerrar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== BODY ===== -->
  <div class="body">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
      <div class="sidebar-label">Proyecto</div>
      <div class="project-switcher" id="project-switcher">
        <div class="project-trigger" id="project-trigger">
          <span class="dot" id="project-dot"></span>
          <div class="project-trigger-text">
            <div class="project-name" id="project-name">ERP</div>
            <div class="project-suite" id="project-suite">Checkout E2E</div>
          </div>
          <span class="chev" id="project-chev">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </span>
        </div>
        <div class="project-menu" id="project-menu" hidden></div>
      </div>

      <div class="sidebar-label" style="margin-top:18px;">Navegación</div>
      <nav class="nav">
        <div class="nav-item active" data-screen="dashboard">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8M13 12h8M13 18h8"/></svg>
          <span>Pruebas</span>
        </div>
        <div class="nav-item" data-screen="live">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>Ejecución en vivo</span>
        </div>
        <div class="nav-item" data-screen="results">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg>
          <span>Resultados</span>
        </div>
        <div class="nav-item" data-screen="history">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 2"/></svg>
          <span>Historial</span>
        </div>
      </nav>

      <div class="sidebar-spacer"></div>

      <div class="sync-pill" id="sync-pill"></div>

      <div class="profile-switcher" id="profile-switcher">
        <div class="profile-menu" id="profile-menu" hidden></div>
        <div class="profile-row" id="profile-trigger">
          <div class="avatar" id="profile-avatar">··</div>
          <div class="profile-text">
            <div class="profile-name" id="profile-name">Sin perfil</div>
            <div class="profile-role" id="profile-role">Elige un perfil</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== MAIN ===== -->
    <main class="main" id="main"></main>

  </div>

  <!-- ===== MODALS (mounted dynamically) ===== -->
  <div class="modal-overlay" id="modal-overlay" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
